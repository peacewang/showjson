name: Release desktop apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin --bundles dmg
          - platform: macos-15
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: windows-2022
            args: --bundles nsis
          - platform: ubuntu-22.04
            args: --bundles appimage,deb

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend
        run: npm run check

      - name: Test parser
        run: npm test

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ShowJSON __VERSION__
          releaseBody: |
            ShowJSON desktop release.

            macOS builds are unsigned until signing secrets are configured.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseAssetNamePattern: ShowJSON-[version]-[platform]-[arch][setup].[ext]
